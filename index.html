<!DOCTYPE html>
<html>
<head>
  <title>CCC Campus Boqueirão - Células</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDrU4FlAgIl8Ru0FkFIXL801gbOSobk_8g",
      authDomain: "celulas-ccc.firebaseapp.com",
      projectId: "celulas-ccc",
      storageBucket: "celulas-ccc.firebasestorage.app",
      messagingSenderId: "685641740419",
      appId: "1:685641740419:web:27e09fc10e30360a896bb6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <!-- Leaflet (Mapa) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family: Arial; }

    #map { height: 60vh; }

    #filtros {
      padding: 10px;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      gap: 10px;
      overflow-x: auto;
    }

    .chip {
      padding: 6px 12px;
      border-radius: 20px;
      background: #eee;
      cursor: pointer;
      white-space: nowrap;
    }

    .chip.active {
      background: #2c7be5;
      color: white;
    }

    #lista {
      padding: 10px;
    }

    .card {
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      margin-top: 6px;
      padding: 6px 10px;
      background: #2c7be5;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div id="filtros">
  <div class="chip" onclick="filtrar(null)">Todos</div>
  <div class="chip" onclick="filtrar('Terça-feira')">Terça</div>
  <div class="chip" onclick="filtrar('Quinta-feira')">Quinta</div>
</div>

<div id="map"></div>
<div id="lista"></div>

<script>
  var map = L.map('map').setView([-25.48, -49.27], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  let todasCelulas = [];
  let filtroAtual = null;

  // 🔥 CARREGAR DO FIREBASE
  async function carregarCelulas() {
    const snapshot = await db.collection("celulas").get();
    todasCelulas = snapshot.docs.map(doc => doc.data());
    render();
  }

  // 🔎 FILTRO
  function filtrar(dia) {
    filtroAtual = dia;
    render();
  }

  // 🎯 RENDER (MAPA + LISTA)
  function render() {
    document.getElementById("lista").innerHTML = "";

    // limpar mapa
    map.eachLayer(layer => {
      if (layer instanceof L.Marker) {
        map.removeLayer(layer);
      }
    });

    let filtradas = todasCelulas.filter(c => {
      return c.ativa && (!filtroAtual || c.dia === filtroAtual);
    });

    filtradas.forEach(c => {

      // marcador
      L.marker([c.lat, c.lng])
        .addTo(map)
        .bindPopup(`<b>${c.nome}</b><br>${c.dia} - ${c.horario}`);

      // card
      document.getElementById("lista").innerHTML += `
        <div class="card">
          <b>${c.nome}</b><br>
          ${c.endereco}<br>
          ${c.dia} - ${c.horario}<br>
          <a class="btn" target="_blank"
            href="https://www.google.com/maps?q=${c.lat},${c.lng}">
            Como chegar
          </a>
        </div>
      `;
    });
  }

  // 🚀 INICIAR
  carregarCelulas();
</script>

</body>
</html>
